<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд — CRMNadya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .grid-2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
    .attention-item { display: flex; align-items: center; gap: .5rem; padding: .5rem 0; font-size: .85rem; border-bottom: 1px solid var(--divider); }
    .attention-item:last-child { border-bottom: none; }
    .week-bars { display: flex; align-items: flex-end; gap: .4rem; height: 60px; padding-top: .5rem; }
    .week-bar { flex: 1; background: var(--primary-light); border-radius: var(--r-sm) var(--r-sm) 0 0; position: relative; min-height: 4px; }
    .week-bar-fill { width: 100%; background: var(--primary); border-radius: var(--r-sm) var(--r-sm) 0 0; position: absolute; bottom: 0; }
    .week-label { text-align: center; font-size: .68rem; color: var(--text-faint); margin-top: .25rem; }
    .staff-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .staff-table th { padding: .5rem .75rem; text-align: right; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border); }
    .staff-table th:first-child { text-align: left; }
    .staff-table td { padding: .5rem .75rem; border-bottom: 1px solid var(--divider); text-align: right; }
    .staff-table td:first-child { text-align: left; }
  </style>
</head>
<body x-data="dashboardPage()" x-init="init()">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="layout">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" x-text="greetTitle">Дашборд</div>
      <div style="margin-left:auto;font-size:.82rem;color:var(--text-muted)" x-html="greetSub"></div>
    </header>

    <main class="main">
      <div class="grid-2">
        <!-- ЛЕВО: Выполнение плана -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
              Выполнение плана
              <span style="font-size:.72rem;color:var(--text-muted);font-weight:400;margin-left:.35rem" x-text="planMonth"></span>
            </div>
            <a href="/plans.html" class="card-link" x-show="isHead">Планы →</a>
          </div>
          <div class="card-body padded">
            <div x-show="loading"><div class="skeleton" style="width:85%"></div><div class="skeleton" style="width:70%;margin-top:.5rem"></div><div class="skeleton" style="width:75%;margin-top:.5rem"></div></div>
            <div x-show="!loading && !planData?.plan" class="empty-mini">
              <span x-show="isHead">План на месяц не задан. <a href="/plans.html">Установить →</a></span>
              <span x-show="!isHead">Руководитель ещё не установил план</span>
            </div>
            <template x-if="!loading && planData?.plan">
              <div>
                <template x-for="r in planRows" :key="r.label">
                  <div class="plan-row">
                    <div class="plan-label" x-text="r.label"></div>
                    <div class="plan-nums" x-text="r.nums"></div>
                    <div class="plan-bar-wrap"><div class="plan-bar" :class="r.barClass" :style="`width:${r.p}%`"></div></div>
                    <div class="plan-pct" :style="`color:${r.color}`" x-text="r.p+'%'"></div>
                  </div>
                </template>
                <div x-show="planDaysInfo" style="margin-top:.65rem;padding-top:.6rem;border-top:1px solid var(--divider);font-size:.7rem;color:var(--text-faint)">
                  Прошло <span x-text="planDaysInfo?.passed"></span> из <span x-text="planDaysInfo?.total"></span> дней (<span x-text="planDaysInfo?.pct"></span>%)
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- ПРАВО: Требует внимания + неделя -->
        <div style="display:flex;flex-direction:column;gap:1rem">
          <div class="card">
            <div class="card-head"><div class="card-title">⚠️ Требует внимания</div></div>
            <div class="card-body padded">
              <div x-show="loading"><div class="skeleton" style="width:90%"></div></div>
              <template x-if="!loading">
                <div>
                  <a class="attention-item" href="/reports.html" x-show="agingCount>0" style="color:inherit">
                    <span style="color:var(--error)">●</span> <span x-text="`${agingCount} запросов без движения 3+ дней`"></span>
                  </a>
                  <a class="attention-item" href="/activities.html" x-show="stats.overdue>0" style="color:inherit">
                    <span style="color:var(--warning)">●</span> <span x-text="`${stats.overdue} просроченных задач`"></span>
                  </a>
                  <div class="attention-item" x-show="agingCount===0 && stats.overdue===0">
                    <span style="color:var(--success)">✓</span> Всё под контролем
                  </div>
                </div>
              </template>
            </div>
          </div>

          <div class="card">
            <div class="card-head"><div class="card-title">🎯 Моя активность за неделю</div><span style="font-size:.8rem;font-weight:700" x-text="weekTotal"></span></div>
            <div class="card-body padded">
              <div style="display:flex;gap:1rem;font-size:.82rem;flex-wrap:wrap">
                <span>📞 <b x-text="weekActivity.calls"></b> звонков</span>
                <span>✉️ <b x-text="weekActivity.emails"></b> писем</span>
                <span>🤝 <b x-text="weekActivity.meetings"></b> встреч</span>
                <span>📄 <b x-text="weekActivity.proposals"></b> КП</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Свежие компании -->
      <div class="card" style="margin-top:1rem">
        <div class="card-head"><div class="card-title">🏢 Свежие компании</div><a href="/companies.html" class="card-link">Все →</a></div>
        <div class="card-body padded">
          <div x-show="loading"><div class="skeleton" style="width:60%"></div></div>
          <div x-show="!loading && !freshCompanies.length" class="empty-mini">Нет компаний</div>
          <template x-for="c in freshCompanies" :key="c.id">
            <a class="attention-item" :href="`/company.html?id=${c.id}`" style="color:inherit">
              <span style="flex:1" x-text="c.name"></span>
              <span class="badge" :class="'badge-'+statusColor(c.calculated_status)" x-text="statusLabel(c.calculated_status)"></span>
            </a>
          </template>
        </div>
      </div>

      <!-- Команда (admin/head) -->
      <div class="card" x-show="isHead && staffData.length" style="margin-top:1rem">
        <div class="card-head"><div class="card-title">👥 Показатели команды</div></div>
        <div class="card-body" style="overflow-x:auto;padding:.5rem 0">
          <table class="staff-table">
            <thead><tr>
              <th>Менеджер</th><th>План ₽</th><th>Факт ₽</th><th>% плана</th><th>Выиграно</th><th>Конверсия</th>
            </tr></thead>
            <tbody>
              <template x-for="m in staffData" :key="m.user_id">
                <tr>
                  <td x-text="m.full_name"></td>
                  <td x-text="fmtShort(m.plan_amount)"></td>
                  <td style="font-weight:600" x-text="fmtShort(m.fact_amount)"></td>
                  <td><span :style="`font-weight:700;color:${pctColor(m.percent_plan)}`" x-text="m.percent_plan!==null?m.percent_plan+'%':'—'"></span></td>
                  <td x-text="`${m.fact_won}/${m.plan_won}`"></td>
                  <td x-text="m.conversion+'%'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="/js/pages/dashboard.js"></script>
</body>
</html>
