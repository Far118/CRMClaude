<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — CRMNadya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%); }
    .login-card { width: 380px; max-width: 90vw; background: var(--surface); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); padding: 2rem; }
    .login-brand { text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: .25rem; }
    .login-sub { text-align: center; color: var(--text-muted); font-size: .85rem; margin-bottom: 1.5rem; }
    .login-field { margin-bottom: 1rem; }
    .login-error { color: var(--error); font-size: .82rem; margin-bottom: 1rem; min-height: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">📦 CRMNadya</div>
    <div class="login-sub">CRM предпродажного этапа</div>
    <div class="login-field">
      <label class="field-label">Email</label>
      <input type="email" id="email" class="input" autocomplete="username" placeholder="you@company.ru">
    </div>
    <div class="login-field">
      <label class="field-label">Пароль</label>
      <input type="password" id="password" class="input" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="login-error" id="error"></div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%">Войти</button>
  </div>

  <script type="module">
    import { api } from '/js/api.js';

    // Если уже залогинен — редирект
    try { await api.get('/auth/me'); location.href = '/index.html'; } catch {}

    const $ = id => document.getElementById(id);
    const error = $('error');

    async function doLogin() {
      error.textContent = '';
      const email = $('email').value.trim();
      const password = $('password').value;
      if (!email || !password) { error.textContent = 'Заполните все поля'; return; }

      $('loginBtn').disabled = true;
      $('loginBtn').textContent = 'Вход…';
      try {
        await api.post('/auth/login', { email, password });
        location.href = '/index.html';
      } catch (err) {
        error.textContent = err.message;
        $('loginBtn').disabled = false;
        $('loginBtn').textContent = 'Войти';
      }
    }

    $('loginBtn').addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
