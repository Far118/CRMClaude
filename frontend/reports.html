<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты — CRMNadya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .report-kpi-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.75rem;margin-bottom:1rem }
    .kpi { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem }
    .kpi-val { font-size:1.5rem;font-weight:800;line-height:1 }
    .kpi-lbl { font-size:.74rem;color:var(--text-muted);margin-top:.2rem }
    .kpi-sub { font-size:.72rem;color:var(--text-faint);margin-top:.1rem }
    .kpi.good { border-left:3px solid var(--success) }
    .kpi.info { border-left:3px solid var(--primary) }
    .kpi.warn { border-left:3px solid var(--warning) }
    .two-col { display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem }
    @media(max-width:700px) { .two-col { grid-template-columns:1fr } }
    .chart-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg) }
    .chart-head { display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border) }
    .chart-title { font-weight:600;font-size:.88rem }
    .chart-body { padding:.75rem 1rem }
    .empty-chart { text-align:center;color:var(--text-muted);font-size:.85rem;padding:1.5rem 0 }
    .bar-row { display:flex;align-items:center;gap:.5rem;padding:.35rem 0 }
    .bar-label { width:160px;flex-shrink:0;font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .bar-wrap { flex:1;height:8px;background:var(--surface-off);border-radius:var(--r-full);overflow:hidden }
    .bar-fill { height:100%;border-radius:var(--r-full);background:var(--primary) }
    .bar-val { width:36px;text-align:right;font-size:.78rem;font-weight:600 }
    .team-table { width:100%;border-collapse:collapse;font-size:.82rem }
    .team-table th { padding:.5rem .75rem;text-align:right;font-weight:600;color:var(--text-muted);border-bottom:2px solid var(--border) }
    .team-table th:first-child { text-align:left }
    .team-table td { padding:.5rem .75rem;border-bottom:1px solid var(--divider);text-align:right }
    .team-table td:first-child { text-align:left }
    /* Upload */
    .upload-drop { border:2px dashed var(--border);border-radius:var(--r-lg);padding:1.75rem;text-align:center;cursor:pointer;transition:.2s }
    .upload-drop:hover,.upload-drop.drag { border-color:var(--primary) }
    .upload-row { display:flex;align-items:center;gap:.5rem;padding:.55rem 1rem;border-bottom:1px solid var(--divider);font-size:.84rem }
    .upload-row:last-child { border-bottom:none }
    .upload-name { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500 }
    .ai-result { background:var(--surface-off);border-radius:var(--r-md);padding:.75rem 1rem;margin:.25rem 1rem .75rem }
    .ai-grid { display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem }
    .ai-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:.65rem;font-size:.81rem }
    .ai-card h4 { font-size:.74rem;font-weight:700;color:var(--text-muted);margin:0 0 .3rem }
    .ai-card ul { padding-left:1.1rem;margin:0 }
    .ai-card li { margin-bottom:.2rem }
    @media(max-width:580px) { .ai-grid { grid-template-columns:1fr } }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="layout">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title">Отчёты</div>
    </header>
    <main class="main">
      <!-- Фильтры -->
      <div class="card" style="margin-bottom:1rem">
        <div class="card-body padded" style="display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-end">
          <div><label class="field-label">От</label><input type="date" id="fFrom" class="input" style="width:145px"></div>
          <div><label class="field-label">До</label><input type="date" id="fTo" class="input" style="width:145px"></div>
          <div id="ownerWrap" style="display:none"><label class="field-label">Менеджер</label><select id="fOwner" class="select" style="width:170px"><option value="">Все</option></select></div>
          <button class="btn btn-primary" id="btnLoad">Показать</button>
          <button class="btn btn-ghost" id="btnThisMonth">Этот месяц</button>
        </div>
      </div>

      <div id="reportContent">
        <div style="text-align:center;padding:3rem;color:var(--text-muted)">Выберите период и нажмите «Показать»</div>
      </div>

      <!-- AI upload -->
      <div class="card" style="margin-top:1.5rem">
        <div class="card-head"><div class="card-title">✨ AI-анализ Excel / CSV</div></div>
        <div class="card-body padded">
          <div class="upload-drop" id="uploadDrop">
            <div style="font-size:.9rem;font-weight:600">Перетащите .xlsx / .xls / .csv</div>
            <div style="font-size:.76rem;color:var(--text-muted);margin-top:.25rem">или кликните для выбора файла (макс 20 МБ)</div>
            <input type="file" id="uploadInput" accept=".xlsx,.xls,.csv" style="display:none">
          </div>
          <div id="uploadList" style="margin-top:.75rem"></div>
        </div>
      </div>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initUI, esc, toast, fmtDate } from '/js/ui.js';
    import { LOOKUP } from '/js/const.js';

    const session = await initUI({ active: 'reports' });
    if (!session) throw new Error('no session');
    const lookup = await LOOKUP.load();
    const isHead = ['admin','head'].includes(session.role);

    // ── Фильтры ───────────────────────────────────────────────────────────────
    const now = new Date();
    document.getElementById('fFrom').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    document.getElementById('fTo').value   = now.toISOString().split('T')[0];

    if (isHead) {
      document.getElementById('ownerWrap').style.display = 'block';
      const users = await fetch('/api/users',{credentials:'include'}).then(r=>r.json()).catch(()=>[]);
      const sel = document.getElementById('fOwner');
      for (const u of users.filter(u=>u.is_active)) {
        const o = document.createElement('option');
        o.value = u.id;
        o.textContent = [u.first_name,u.last_name].filter(Boolean).join(' ')||u.email;
        sel.appendChild(o);
      }
    }

    document.getElementById('btnThisMonth').addEventListener('click', () => {
      const n = new Date();
      document.getElementById('fFrom').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`;
      document.getElementById('fTo').value   = n.toISOString().split('T')[0];
    });
    document.getElementById('btnLoad').addEventListener('click', loadReports);

    function buildQ() {
      const p = new URLSearchParams();
      const from = document.getElementById('fFrom').value;
      const to   = document.getElementById('fTo').value;
      const owner = isHead ? document.getElementById('fOwner').value : '';
      if (from)  p.set('from', from);
      if (to)    p.set('to', to);
      if (owner) p.set('owner_id', owner);
      return p.toString();
    }

    async function apiReport(path) {
      const r = await fetch(`/api/reports/${path}?${buildQ()}`,{credentials:'include'});
      if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
      return r.json();
    }

    function fmtRub(n) {
      n = Number(n||0);
      if (n>=1_000_000) return (n/1_000_000).toFixed(1)+' млн';
      if (n>=1_000) return Math.round(n/1_000)+' тыс';
      return String(n);
    }

    function barRows(items, labelKey, countKey, color) {
      if (!items?.length) return '<div class="empty-chart">Нет данных</div>';
      const max = Math.max(...items.map(i=>Number(i[countKey])),1);
      return items.map(i => {
        const pct = Math.round(Number(i[countKey])/max*100);
        return `<div class="bar-row">
          <div class="bar-label" title="${esc(i[labelKey])}">${esc(i[labelKey])}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color||'var(--primary)'}"></div></div>
          <div class="bar-val">${i[countKey]}</div>
        </div>`;
      }).join('');
    }

    async function loadReports() {
      const btn = document.getElementById('btnLoad');
      btn.disabled = true; btn.textContent = 'Загрузка…';
      try {
        const [summary, funnelData, actTypes, outcomes, timeline] = await Promise.all([
          apiReport('summary'), apiReport('funnel'), apiReport('activity'),
          apiReport('outcomes'), apiReport('timeline'),
        ]);
        const teamData = isHead ? await apiReport('team') : [];
        render(summary, funnelData, actTypes, outcomes, timeline, teamData);
      } catch (err) {
        toast('Ошибка: '+err.message,'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Показать';
      }
    }

    function render(s, funnelData, actTypes, outcomes, timeline, teamData) {
      const r = s.requests||{}, a = s.activities||{};
      // Воронка: API возвращает { stages: [] }
      const stages = Array.isArray(funnelData) ? funnelData : (funnelData?.stages||[]);

      const convClass = (r.conversion||0)>=40?'good':(r.conversion||0)>=20?'info':'warn';

      // Timeline SVG
      let tlHtml = '<div class="empty-chart">Нет данных</div>';
      if (timeline?.length) {
        const W = Math.max(timeline.length*30,300), H = 70;
        const maxT = Math.max(...timeline.map(t=>t.total),1);
        const bw = Math.min(Math.floor(W/timeline.length)-3,24);
        const bars = timeline.map((t,i) => {
          const bh = Math.max(Math.round(t.total/maxT*(H-18)),2);
          const x = Math.floor(i*(W/timeline.length))+Math.floor((W/timeline.length-bw)/2);
          const y = H-bh-14;
          const dt = new Date(t.period).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
          return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="var(--primary)" opacity=".75"/>
            ${i%Math.ceil(timeline.length/8)===0?`<text x="${x+bw/2}" y="${H}" text-anchor="middle" font-size="9" fill="var(--text-faint)">${dt}</text>`:''}
            ${t.total>0?`<text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${t.total}</text>`:''}`;
        }).join('');
        tlHtml = `<div style="overflow-x:auto"><svg width="${W}" height="${H+4}" viewBox="0 0 ${W} ${H+4}">${bars}</svg></div>`;
      }

      // Team
      let teamHtml = '';
      if (isHead && teamData?.length) {
        const rows = teamData.map(m=>`<tr>
          <td>${esc(m.name)}</td>
          <td>${m.requests_total}</td>
          <td style="font-weight:700;color:var(--success)">${m.won}</td>
          <td>${fmtRub(m.revenue)} ₽</td>
          <td>${m.activities}</td>
          <td>${m.conversion}%</td>
        </tr>`).join('');
        teamHtml = `<div class="chart-card" style="margin-top:1rem">
          <div class="chart-head"><div class="chart-title">Показатели команды</div></div>
          <div style="overflow-x:auto;padding:.5rem 0">
            <table class="team-table">
              <thead><tr><th>Менеджер</th><th>Запросов</th><th>Выиграно</th><th>Выручка</th><th>Активности</th><th>Конверсия</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
      }

      document.getElementById('reportContent').innerHTML = `
        <div class="report-kpi-grid">
          <div class="kpi info"><div class="kpi-val">${fmtRub(r.revenue||0)} ₽</div><div class="kpi-lbl">Выручка (выиграно)</div><div class="kpi-sub">Маржа ${r.avg_margin||0}%</div></div>
          <div class="kpi ${convClass}"><div class="kpi-val">${r.conversion||0}%</div><div class="kpi-lbl">Конверсия</div><div class="kpi-sub">${r.won||0} выигр. / ${r.lost||0} проигр.</div></div>
          <div class="kpi"><div class="kpi-val">${r.total||0}</div><div class="kpi-lbl">Всего запросов</div></div>
          <div class="kpi"><div class="kpi-val">${a.total||0}</div><div class="kpi-lbl">Активностей</div><div class="kpi-sub">${a.calls||0} зв. · ${a.meetings||0} встреч</div></div>
          <div class="kpi"><div class="kpi-val">${s.companies||0}</div><div class="kpi-lbl">Новых компаний</div></div>
          <div class="kpi"><div class="kpi-val">${a.proposals||0}</div><div class="kpi-lbl">Отправлено КП</div></div>
        </div>

        <div class="chart-card" style="margin-bottom:1rem">
          <div class="chart-head"><div class="chart-title">Активность по дням</div></div>
          <div class="chart-body">${tlHtml}</div>
        </div>

        <div class="two-col">
          <div class="chart-card">
            <div class="chart-head"><div class="chart-title">Воронка запросов</div></div>
            <div class="chart-body">${barRows(stages,'label','count')}</div>
          </div>
          <div class="chart-card">
            <div class="chart-head"><div class="chart-title">Виды активности</div></div>
            <div class="chart-body">${barRows(actTypes.map(a=>({label:lookup.activity_type_labels?.[a.type]||a.type,count:a.count})),'label','count','var(--purple)')}</div>
          </div>
        </div>

        <div class="chart-card" style="margin-bottom:1rem">
          <div class="chart-head"><div class="chart-title">Итоги закрытых запросов</div></div>
          <div class="chart-body">${barRows(outcomes,'label','count','var(--orange)')}</div>
        </div>
        ${teamHtml}
      `;
    }

    // ── Upload ────────────────────────────────────────────────────────────────
    const drop = document.getElementById('uploadDrop');
    const input = document.getElementById('uploadInput');
    let files = [];

    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
    drop.addEventListener('click', () => input.click());
    input.addEventListener('change', () => handleFile(input.files[0]));

    async function handleFile(file) {
      if (!file) return;
      const entry = { id: null, name: file.name, size: (file.size/1024).toFixed(1)+'KB', status: 'uploading', result: null, error: '' };
      files.unshift(entry);
      renderList();
      try {
        const fd = new FormData(); fd.append('file', file);
        const r = await fetch('/api/ai-reports',{method:'POST',credentials:'include',body:fd});
        if (!r.ok) throw new Error(await r.text());
        const d = await r.json();
        entry.id = d.id;
        entry.status = 'done';
        toast('Файл загружен: '+esc(file.name),'success');
      } catch(err) {
        entry.status = 'error'; entry.error = err.message;
        toast('Ошибка: '+err.message,'error');
      }
      renderList();
    }

    async function analyzeEntry(entry) {
      if (!entry.id) return;
      entry.status = 'analyzing'; renderList();
      try {
        const r = await fetch(`/api/ai-reports/${entry.id}/analyze`,{method:'POST',credentials:'include'});
        if (!r.ok) throw new Error(await r.text());
        const d = await r.json();
        entry.result = d.analysis || d;
        entry.status = 'analyzed';
        toast('Анализ готов!','success');
      } catch(err) {
        entry.status = 'error'; entry.error = err.message;
        toast('Ошибка AI: '+err.message,'error');
      }
      renderList();
    }

    function renderList() {
      const el = document.getElementById('uploadList');
      if (!files.length) { el.innerHTML=''; return; }
      el.innerHTML = '<div class="card">'+files.map((f,i)=>`
        <div class="upload-row">
          <div class="upload-name" title="${esc(f.name)}">${esc(f.name)}</div>
          <span style="font-size:.72rem;color:var(--text-muted)">${esc(f.size)}</span>
          ${f.status==='uploading'?'<span class="badge badge-orange">Загрузка…</span>':''}
          ${f.status==='analyzing'?'<span class="badge badge-blue">Анализ…</span>':''}
          ${f.status==='done'?`<button class="btn btn-sm btn-ghost" data-idx="${i}">✨ Анализировать</button>`:''}
          ${f.status==='analyzed'?'<span class="badge badge-green">Готово</span>':''}
          ${f.status==='error'?`<span class="badge badge-red" title="${esc(f.error)}">Ошибка</span>`:''}
        </div>
        ${f.status==='analyzed'&&f.result ? renderAI(f.result) : ''}
      `).join('')+'</div>';

      el.querySelectorAll('[data-idx]').forEach(btn => {
        btn.addEventListener('click', () => analyzeEntry(files[+btn.dataset.idx]));
      });
    }

    function renderAI(r) {
      const list = arr => Array.isArray(arr) ? arr.map(s=>`<li>${esc(String(s))}</li>`).join('') : `<li>${esc(String(arr))}</li>`;
      return `<div class="ai-result">
        <div style="font-size:.78rem;font-weight:700;color:var(--text-muted);margin-bottom:.35rem">✨ AI-анализ</div>
        <div class="ai-grid">
          ${r.executive_summary||r.summary?`<div class="ai-card"><h4>Резюме</h4><p style="margin:0">${esc(r.executive_summary||r.summary)}</p></div>`:''}
          ${r.trends?.length?`<div class="ai-card"><h4>Тенденции</h4><ul>${list(r.trends)}</ul></div>`:''}
          ${r.anomalies?.length?`<div class="ai-card"><h4>Аномалии</h4><ul>${list(r.anomalies)}</ul></div>`:''}
          ${r.recommendations?.length?`<div class="ai-card"><h4>Рекомендации</h4><ul>${list(r.recommendations)}</ul></div>`:''}
        </div>
      </div>`;
    }
  </script>
</body>
</html>
